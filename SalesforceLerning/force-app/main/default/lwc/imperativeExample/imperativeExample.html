<template>
    <lightning-card title="Imperative Demo">
        <lightning-button label="Fetch Contacts" onclick={handleClick}></lightning-button>
        <template if:true={contacts}>
            <lightning-datatable
            key-field="Id"
            data={contacts}
            columns={columns}>
 
            </lightning-datatable>
        </template>
        <template if:true={error}>
            <p>Alert: {error}</p>
        </template>
    </lightning-card>
</template>
